name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via LFTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp

          # Create lftp script with all uploads in single connection
          cat > /tmp/deploy.lftp << EOF
          set ftp:ssl-allow off
          set net:timeout 30
          set net:max-retries 2
          open -u $FTP_USER,$FTP_PASS mosaichostels.com
          $(for f in *.html styles/global.css components/*.js; do [ -f "$f" ] && echo "put $f"; done)
          $(for f in images/*.{jpg,png,svg,jpeg}; do [ -f "$f" ] && echo "put $f"; done)
          quit
          EOF

          # Execute deployment
          lftp < /tmp/deploy.lftp
          echo "✓ Deployment complete"
