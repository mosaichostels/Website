<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Image Gallery</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .image-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .image-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }
        .image-info {
            padding: 16px;
        }
        .image-name {
            font-weight: 600;
            color: #1a1208;
            margin: 0 0 8px 0;
            word-break: break-all;
            font-size: 14px;
        }
        .image-size {
            font-size: 12px;
            color: #666;
            margin: 0;
        }
        .instructions {
            background: white;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 32px;
            border-left: 4px solid #C88A0A;
        }
        .instructions p {
            margin: 8px 0;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Website Image Gallery</h1>

    <div class="instructions">
        <p><strong>Instructions:</strong> Review the images below. Tell me which ones should be used and where on the website (hero, gallery, rooms, about, etc.)</p>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
        const images = [
            'IMG_1912.JPG',
            'IMG_1920.JPG',
            'IMG_1923.JPG',
            'IMG_1928.JPG',
            'IMG_1930.JPG',
            'IMG_1931.JPG',
            'IMG_1933.JPG',
            'IMG_1934.JPG',
            'IMG_4450.JPG',
            'IMG_4451.JPG',
            'PHOTO-2025-08-30-20-52-21.jpg'
        ];

        const gallery = document.getElementById('gallery');
        images.forEach(img => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `
                <img src="./${img}" alt="${img}" loading="lazy">
                <div class="image-info">
                    <p class="image-name">${img}</p>
                    <p class="image-size">Click to select details</p>
                </div>
            `;
            gallery.appendChild(card);
        });
    </script>
</body>
</html>
