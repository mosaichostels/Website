<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Mosaic Hostel Varanasi</title>
    <meta name="description" content="Contact Mosaic Hostel Varanasi for reservations, questions, or feedback. 24/7 reception. Phone, email, WhatsApp, and contact form available.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap"></noscript>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="icon" type="image/png" href="images/mosaic-logo.png">
</head>
<body>
    <style>
        .hero { background: linear-gradient(135deg, rgba(26, 18, 8, 0.7), rgba(26, 18, 8, 0.85)), url('https://www.mosaichostels.com/wp-content/uploads/2026/02/IMG_1357-scaled.jpg') center/cover; aspect-ratio: 16 / 9; max-height: 400px; display: flex; align-items: center; justify-content: center; text-align: center; color: white; margin-top: 80px; }
        .hero h1 { font-family: 'Google Sans', system-ui, -apple-system, sans-serif; font-size: 56px; font-weight: 400; }
        .contact-grid { display: flex; flex-direction: column; gap: 40px; }
        .contact-info h2 { font-size: 28px; margin-bottom: 24px; }
        #form-status { border-radius: 4px; font-size: 14px; line-height: 1.5; }
        #form-status:not(:empty) { padding: 12px 16px; margin-bottom: 16px; }
        #form-status.success { background: #d4edda; color: #155724; }
        #form-status.error { background: #f8d7da; color: #721c24; }
        .form-group { margin-bottom: 24px; }
        @media (min-width: 768px) {
            section { padding: 60px 40px; }
        }
        @media (min-width: 1024px) {
            section { padding: 100px 60px; }
            .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        }
        @media (max-width: 767px) {
            nav { padding: 0 20px; height: 70px; }
            .hero { aspect-ratio: 4 / 3; max-height: 300px; }
        }
    </style>
    <link rel="icon" type="image/png" href="images/mosaic-logo.png">
</head>
<body>
    <main>

    <div class="hero">
        <h1>We're Here<br>(Steps from the Ghats)</h1>
    </div>

    <section>
        <div class="contact-grid">
            <form aria-label="Contact form">
                <h2>Send us a Message</h2>
                <div role="alert" aria-live="polite" id="form-status"></div>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required aria-required="true"></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>

            <div class="contact-info">
                <h2>Contact Information</h2>
                <div class="info-item">
                    <strong>Address</strong>
                    <p>Mosaic Hostel, Assi Ghat, Varanasi 221005, India</p>
                </div>
                <div class="info-item">
                    <strong>Phone</strong>
                    <p><a href="tel:+919125492225" aria-label="Call Mosaic Hostel at +91 91254 92225">+91 91254 92225</a></p>
                </div>
                <div class="info-item">
                    <strong>Email</strong>
                    <p><a href="mailto:mosaichostels@gmail.com" aria-label="Email Mosaic Hostel">mosaichostels@gmail.com</a></p>
                </div>
                <div class="info-item">
                    <strong>WhatsApp</strong>
                    <p><a href="https://wa.me/919125492225" aria-label="Message Mosaic Hostel on WhatsApp">Message us on WhatsApp</a></p>
                </div>
                <div class="info-item">
                    <strong>Hours</strong>
                    <p>Reception: 24/7<br>Check-in: 2:00 PM<br>Check-out: 11:00 AM</p>
                </div>
            </div>
        </div>
    </section>

    </main>

    <script>
        const form = document.querySelector('form');
        const status = document.getElementById('form-status');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const invalid = [...form.querySelectorAll('[required]')].filter(f => !f.value.trim());
            if (invalid.length) {
                status.className = 'error';
                status.textContent = 'Please fill in all required fields.';
                invalid[0].focus();
                return;
            }
            status.className = 'success';
            status.textContent = 'Message sent! We will get back to you soon.';
            form.reset();
        });
    </script>
    <script src="components/loader.js"></script>
</body>
</html>
