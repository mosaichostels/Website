<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Mosaic Hostel Varanasi</title>
    <meta name="description" content="Contact Mosaic Hostel Varanasi for reservations, questions, or feedback. 24/7 reception. Phone, email, WhatsApp, and contact form available.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap"></noscript>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="icon" type="image/png" href="images/mosaic-logo.png">
    <link rel="canonical" href="https://mosaichostels.com/contact.html">
</head>
<body>
    <link rel="icon" type="image/png" href="images/mosaic-logo.png">
</head>
<body>
    <main id="main">

    <div class="hero">
        <h1>We're Here<br>(Steps from the Ghats)</h1>
    </div>

    <section>
        <div class="contact-grid">
            <form aria-label="Contact form to send a message to Mosaic Hostel">
                <h2>Send us a Message</h2>
                <div role="alert" aria-live="polite" aria-atomic="true" id="form-status"></div>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required aria-required="true" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required aria-required="true" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required aria-required="true" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required aria-required="true"></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>

            <div class="contact-info">
                <h2>Contact Information</h2>
                <div class="info-item">
                    <strong>Address</strong>
                    <p>Mosaic Hostel, Assi Ghat, Varanasi 221005, India</p>
                </div>
                <div class="info-item">
                    <strong>Phone</strong>
                    <p><a href="tel:+919125492225" aria-label="Call Mosaic Hostel at +91 91254 92225">+91 91254 92225</a></p>
                </div>
                <div class="info-item">
                    <strong>Email</strong>
                    <p><a href="mailto:mosaichostels@gmail.com" aria-label="Email Mosaic Hostel">mosaichostels@gmail.com</a></p>
                </div>
                <div class="info-item">
                    <strong>WhatsApp</strong>
                    <p><a href="https://wa.me/919125492225" aria-label="Message Mosaic Hostel on WhatsApp">Message us on WhatsApp</a></p>
                </div>
                <div class="info-item">
                    <strong>Hours</strong>
                    <p>Reception: 24/7<br>Check-in: 2:00 PM<br>Check-out: 11:00 AM</p>
                </div>
            </div>
        </div>
    </section>

    </main>

    <script>
        const form = document.querySelector('form');
        const status = document.getElementById('form-status');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const invalid = [...form.querySelectorAll('[required]')].filter(f => !f.value.trim());
            if (invalid.length) {
                status.className = 'error';
                status.textContent = 'Please fill in all required fields.';
                invalid[0].focus();
                return;
            }
            status.className = 'success';
            status.textContent = 'Message sent! We will get back to you soon.';
            form.reset();
        });
    </script>
    <script src="components/loader.js"></script>
</body>
</html>
