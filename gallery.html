<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Mosaic Hostel Varanasi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap"></noscript>





    <link rel="stylesheet" href="styles/global.css">
    <link rel="icon" type="image/png" href="images/mosaic-logo.png">
    <meta name="description" content="Explore our photo gallery of Mosaic Hostel in Varanasi. View our rooms, common areas, rooftop terrace, and facilities.">
    <link rel="canonical" href="https://mosaichostels.com/gallery.html">
</head>
<body>
    <main>

    <div class="hero-section">
        <h1>Every Corner,<br>Every Story</h1>
    </div>

    <section>
        <h2>Spaces & Moments</h2>
        <div class="gallery-masonry">
            <div class="gallery-item" tabindex="0" role="button" aria-label="Private Room — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'Private Room')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'Private Room');}">
                <img src="images/IMG_1931.JPG" alt="Private Room" width="800" height="600" style="aspect-ratio: 4/3;" fetchpriority="high">
                <div class="gallery-overlay"><div class="gallery-title">Private Room</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="8-Bed Dorm — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'8-Bed Dorm')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'8-Bed Dorm');}">
                <img src="images/IMG_1933.JPG" alt="8-Bed Dorm" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">8-Bed Dorm</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="6-Bed Dorm — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'6-Bed Dorm')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'6-Bed Dorm');}">
                <img src="images/IMG_1933.JPG" alt="6-Bed Dorm" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">6-Bed Dorm</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="4-Bed Dorm — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'4-Bed Dorm')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'4-Bed Dorm');}">
                <img src="images/IMG_1934.JPG" alt="4-Bed Dorm" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">4-Bed Dorm</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="6-Bed Female Dorm — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'6-Bed Female Dorm')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'6-Bed Female Dorm');}">
                <img src="images/IMG_1920.JPG" alt="Female Dorm" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">6-Bed Female Dorm</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="Rooftop Terrace — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'Rooftop Terrace')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'Rooftop Terrace');}">
                <img src="images/IMG_4451.JPG" alt="Rooftop" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">Rooftop Terrace</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="Common Area — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'Common Area')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'Common Area');}">
                <img src="images/IMG_1934.JPG" alt="Common Area" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">Common Area</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="Lounge — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'Lounge')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'Lounge');}">
                <img src="https://www.mosaichostels.com/wp-content/uploads/2026/02/IMG_1931-1-scaled.jpg" alt="Lounge" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">Lounge</div></div>
            </div>
            <div class="gallery-item" tabindex="0" role="button" aria-label="Facilities — click to enlarge" onclick="openModal(this.querySelector('img').src,this.querySelector('img').alt,'Facilities')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal(this.querySelector('img').src,this.querySelector('img').alt,'Facilities');}">
                <img src="images/IMG_1933.JPG" alt="Facilities" width="800" height="600" style="aspect-ratio: 4/3;" loading="lazy">
                <div class="gallery-overlay"><div class="gallery-title">Facilities</div></div>
            </div>
        </div>
    </section>

    </main>

    <script src="components/modal.js"></script>
    <script src="components/loader.js"></script>
</body>
</html>
