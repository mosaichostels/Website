<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="keywords" content="blog, varanasi, travel, hostel, stories">

        <section class="blog-section">

                <h2 class="section-title">Coming Soon</h2>
                <p style="text-align: center; color: var(--muted); font-size: 18px; margin: 40px 0;">

                </p>
            </div>

    </main>
